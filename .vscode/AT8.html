<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Tarefas - Editar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 550px;
            margin: 0 auto;
            background: white;
            border-radius: 25px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
            color: #333;
            padding: 35px;
            text-align: center;
        }
        h1 {
            font-size: 32px;
            margin-bottom: 8px;
        }
        .contador {
            font-size: 16px;
            opacity: 0.9;
            color: #555;
        }
        .input-section {
            padding: 35px;
            background: #f8f9fc;
        }
        .input-container {
            display: flex;
            gap: 12px;
            margin-bottom: 10px;
        }
        input[type="text"] {
            flex: 1;
            padding: 16px;
            border: 2px solid #e1e8ed;
            border-radius: 15px;
            font-size: 16px;
            transition: all 0.3s;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #ff9a9e;
            box-shadow: 0 0 0 3px rgba(255,154,158,0.1);
        }
        .btn {
            padding: 16px 24px;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            flex-shrink: 0;
        }
        .btn-add {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            color: #333;
        }
        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255,154,158,0.3);
        }
        .lista-section {
            padding: 0 35px 35px;
            max-height: 450px;
            overflow-y: auto;
        }
        ul {
            list-style: none;
        }
        li {
            display: flex;
            align-items: center;
            padding: 22px;
            margin: 12px 0;
            background: white;
            border-radius: 18px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.08);
            transition: all 0.3s;
            gap: 15px;
            position: relative;
        }
        li:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.15);
        }
        li.editando {
            background: linear-gradient(135deg, #fff3cd 0%, #ffeaa7 100%);
            border: 2px solid #fdcb6e;
        }
        .tarefa-texto {
            flex: 1;
            font-size: 17px;
            padding: 5px 0;
            word-break: break-word;
        }
        .input-edit {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #fdcb6e;
            border-radius: 10px;
            font-size: 16px;
        }
        .btn-small {
            padding: 10px 16px;
            font-size: 14px;
            margin-left: 8px;
            flex-shrink: 0;
        }
        .btn-edit {
            background: #00b894;
            color: white;
        }
        .btn-edit:hover {
            background: #00a085;
        }
        .btn-save {
            background: #00cec9;
            color: white;
        }
        .btn-save:hover {
            background: #00b7b0;
        }
        .btn-cancel {
            background: #fdcb6e;
            color: #2d3436;
        }
        .btn-cancel:hover {
            background: #fdcd6e;
        }
        .btn-delete {
            background: #e17055;
            color: white;
            margin-left: auto;
        }
        .btn-delete:hover {
            background: #d63031;
        }
        .vazio {
            text-align: center;
            color: #888;
            font-style: italic;
            padding: 80px 30px;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>✏️ Lista de Tarefas</h1>
            <div class="contador">
                <span id="contador">0</span> tarefas 
                <span id="editandoStatus" style="display: none;">| Editando tarefa #<span id="editandoIndex"></span></span>
            </div>
        </div>

        <div class="input-section">
            <div class="input-container">
                <input type="text" id="novaTarefa" placeholder="Digite uma nova tarefa..." maxlength="80">
                <button class="btn btn-add" onclick="adicionarTarefa()">➕</button>
            </div>
        </div>

        <div class="lista-section">
            <ul id="listaTarefas"></ul>
        </div>
    </div>

    <script>
        let tarefas = [];
        let editandoIndex = -1;

        function adicionarTarefa() {
            const input = document.getElementById('novaTarefa');
            const texto = input.value.trim();
            
            if (texto && editandoIndex === -1) {
                tarefas.push(texto);
                input.value = '';
                renderizarLista();
            }
        }

        function iniciarEdicao(index) {
            editandoIndex = index;
            document.getElementById('editandoStatus').style.display = 'inline';
            document.getElementById('editandoIndex').textContent = index + 1;
            renderizarLista();
            document.getElementById(`inputEdit${index}`).focus();
        }

        function salvarEdicao(index) {
            const input = document.getElementById(`inputEdit${index}`);
            const novoTexto = input.value.trim();
            
            if (novoTexto) {
                tarefas.splice(index, 1, novoTexto);
                editandoIndex = -1;
                document.getElementById('editandoStatus').style.display = 'none';
                renderizarLista();
            }
        }

        function cancelarEdicao() {
            editandoIndex = -1;
            document.getElementById('editandoStatus').style.display = 'none';
            renderizarLista();
        }

        function removerTarefa(index) {
            tarefas.splice(index, 1);
            if (editandoIndex === index) {
                cancelarEdicao();
            }
            renderizarLista();
        }

        function renderizarLista() {
            const lista = document.getElementById('listaTarefas');
            const contador = document.getElementById('contador');
            
            contador.textContent = tarefas.length;

            if (tarefas.length === 0) {
                lista.innerHTML = '<li class="vazio">Nenhuma tarefa. Adicione a primeira! 🚀</li>';
                return;
            }

            lista.innerHTML = '';
            tarefas.forEach((tarefa, index) => {
                const li = document.createElement('li');
                const estaEditando = index === editandoIndex;
                
                if (estaEditando) {
                    li.classList.add('editando');
                    li.innerHTML = `
                        <input type="text" id="inputEdit${index}" class="input-edit" value="${tarefa}" onkeypress="if(event.key==='Enter') salvarEdicao(${index})">
                        <button class="btn btn-small btn-save" onclick="salvarEdicao(${index})">💾 Salvar</button>
                        <button class="btn btn-small btn-cancel" onclick="cancelarEdicao()">❌ Cancelar</button>
                    `;
                } else {
                    li.innerHTML = `
                        <span class="tarefa-texto">${tarefa}</span>
                        <div>
                            <button class="btn btn-small btn-edit" onclick="iniciarEdicao(${index})">✏️ Editar</button>
                            <button class="btn btn-small btn-delete" onclick="removerTarefa(${index})">🗑️</button>
                        </div>
                    `;
                }
                
                lista.appendChild(li);
            });
        }

        document.getElementById('novaTarefa').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                adicionarTarefa();
            }
        });

        renderizarLista();
    </script>
</body>
</html>
