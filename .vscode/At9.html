<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 Catálogo de Filmes</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f0f23;
            color: white;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px;
            text-align: center;
        }
        h1 {
            font-size: 36px;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }
        .contador {
            font-size: 18px;
            opacity: 0.9;
        }
        .form-section {
            padding: 40px;
            background: rgba(255,255,255,0.03);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .form-grid {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr;
            gap: 20px;
            align-items: end;
        }
        input, select {
            padding: 16px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            color: black;
            font-size: 16px;
            width: 100%;
        }
        input::placeholder {
            color: rgba(250, 246, 246, 0.6);
        }
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.2);
        }
        .btn-add {
            padding: 16px 30px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-add:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(240,147,251,0.4);
        }
        .filtros-section {
            padding: 25px 40px;
            background: rgba(255,255,255,0.02);
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }
        .filtro-genero {
            padding: 12px 24px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 25px;
            color: white;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        .filtro-genero:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-1px);
        }
        .filtro-genero.active {
            background: linear-gradient(135deg, #4ecdc4 0%, #44a08d 100%);
            box-shadow: 0 5px 15px rgba(78,205,196,0.4);
        }
        .filtro-todos {
            background: rgba(255,255,255,0.1);
        }
        .lista-section {
            padding: 40px;
        }
        .filmes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }
        .filme-card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.4s;
            position: relative;
            overflow: hidden;
        }
        .filme-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2);
        }
        .filme-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            border-color: rgba(255,255,255,0.3);
        }
        .titulo {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 12px;
            color: #fff;
        }
        .info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
        }
        .genero {
            background: rgba(102,126,234,0.3);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
        }
        .ano {
            font-size: 18px;
            font-weight: 600;
            color: #f1f2f6;
        }
        .vazio {
            grid-column: 1 / -1;
            text-align: center;
            color: rgba(255,255,255,0.5);
            font-size: 20px;
            padding: 80px 20px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎬 Catálogo de Filmes</h1>
            <div class="contador" id="contador">0 filmes cadastrados</div>
        </div>

        <div class="form-section">
            <form id="formFilme" class="form-grid">
                <input type="text" id="titulo" placeholder="Título do filme" required maxlength="50">
                <select id="genero" required>
                    <option value="">Gênero</option>
                    <option value="Ação">Ação</option>
                    <option value="Drama">Drama</option>
                    <option value="Comédia">Comédia</option>
                    <option value="Terror">Terror</option>
                    <option value="Romance">Romance</option>
                    <option value="Ficção Científica">Ficção Científica</option>
                </select>
                <input type="number" id="ano" placeholder="Ano" min="1900" max="2025" required>
                <button type="submit" class="btn-add">➕ Adicionar Filme</button>
            </form>
        </div>

        <div class="filtros-section">
            <div class="filtro-genero filtro-todos active" onclick="filtrarGenero('todos')">Todos</div>
            <div class="filtro-genero" onclick="filtrarGenero('Ação')">Ação</div>
            <div class="filtro-genero" onclick="filtrarGenero('Drama')">Drama</div>
            <div class="filtro-genero" onclick="filtrarGenero('Comédia')">Comédia</div>
            <div class="filtro-genero" onclick="filtrarGenero('Terror')">Terror</div>
            <div class="filtro-genero" onclick="filtrarGenero('Romance')">Romance</div>
            <div class="filtro-genero" onclick="filtrarGenero('Ficção Científica')">Ficção Científica</div>
        </div>

        <div class="lista-section">
            <div class="filmes-grid" id="listaFilmes"></div>
        </div>
    </div>

    <script>
        let filmes = [];
        let generoFiltro = 'todos';

        document.getElementById('formFilme').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const titulo = document.getElementById('titulo').value.trim();
            const genero = document.getElementById('genero').value;
            const ano = document.getElementById('ano').value;
            
            if (titulo && genero && ano) {
                filmes.push({
                    titulo,
                    genero,
                    ano
                });
                
                this.reset();
                atualizarCatalogo();
            }
        });

        function filtrarGenero(genero) {
            generoFiltro = genero;
            
            document.querySelectorAll('.filtro-genero').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            atualizarCatalogo();
        }

        function atualizarCatalogo() {
            const lista = document.getElementById('listaFilmes');
            const contador = document.getElementById('contador');
            
            let filmesFiltrados = generoFiltro === 'todos' 
                ? filmes 
                : filmes.filter(filme => filme.genero === generoFiltro);
            
            contador.textContent = `${filmesFiltrados.length} filmes ${generoFiltro !== 'todos' ? `(${generoFiltro})` : ''}`;
            
            if (filmesFiltrados.length === 0) {
                lista.innerHTML = '<div class="vazio">Nenhum filme encontrado 😢</div>';
                return;
            }
            
            lista.innerHTML = '';
            filmesFiltrados.forEach(filme => {
                const card = document.createElement('div');
                card.className = 'filme-card';
                card.innerHTML = `
                    <div class="titulo">${filme.titulo}</div>
                    <div class="info">
                        <span class="genero">${filme.genero}</span>
                        <span class="ano">${filme.ano}</span>
                    </div>
                `;
                lista.appendChild(card);
            });
        }
    </script>
</body>
</html>
